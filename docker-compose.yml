version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: clipsphere-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_storage:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  mongodb:
    image: mongo:latest
    container_name: clipsphere-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: clipsphere
    volumes:
      - mongodb_storage:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_storage:
  mongodb_storage:
